name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          modules: 'qtcharts'

      - name: Configure CMake
        working-directory: qt-app
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: qt-app
        run: cmake --build build --config Release

      - name: Test
        working-directory: qt-app/build
        run: ctest -C Release --output-on-failure

      - name: Package
        working-directory: qt-app/build
        run: cpack -C Release -G ZIP

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PortfolioRecommender-Windows
          path: qt-app/build/PortfolioRecommender-*.zip
