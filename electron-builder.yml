appId: com.portfolio-recommender.app
productName: Portfolio Recommender
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - package.json
win:
  target: nsis
  icon: resources/icons/icon.ico
mac:
  target: dmg
  icon: resources/icons/icon.icns
  category: public.app-category.finance
linux:
  target: AppImage
  icon: resources/icons
  category: Finance
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
